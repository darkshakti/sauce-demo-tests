name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke (Chromium)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --ignore-scripts skips the postinstall browser download; the next step
        # installs only the browser this job needs (with system deps).
        run: npm ci --ignore-scripts

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=smoke

      - name: Upload smoke HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 14

  regression:
    name: Smoke + Regression (${{ matrix.project }})
    # Only run the full cross-browser suite once the smoke gate is green.
    needs: smoke
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run full suite (smoke + regression)
        run: npx playwright test --project=${{ matrix.project }}

      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload Allure results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ matrix.project }}
          path: allure-results/
          retention-days: 14

  allure-report:
    name: Publish Allure report
    if: ${{ !cancelled() }}
    needs: regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all Allure results
        uses: actions/download-artifact@v8
        with:
          pattern: allure-results-*
          path: allure-results
          merge-multiple: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v5 # Allure CLI is a JVM tool
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

  deploy-pages:
    name: Deploy Allure report to GitHub Pages
    # Only publish from the default branch — keeps PR runs from overwriting the live site.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: allure-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download the generated Allure report
        uses: actions/download-artifact@v8
        with:
          name: allure-report
          path: allure-report

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
